<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>足球數據儀表板</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .card { border: 1px solid #ddd; padding: 10px; margin: 5px 0; border-radius: 5px; cursor: pointer; }
        pre { background: #eee; padding: 10px; overflow-x: auto; font-size: 12px; }
        button { padding: 10px; background: #2b4c7e; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>⚽ 足球數據中心</h1>
    <div id="content">正在初始化後端連線...</div>

    <script>
        const BACKEND = "https://2026-fifa-439n.vercel.app";

        async function init() {
            const content = document.getElementById('content');
            try {
                // 測試連線：搜尋英超 (Premier League)
                const res = await fetch(`${BACKEND}/api/football?endpoint=leagues?search=Premier`);
                const data = await res.json();
                
                if (data.response && data.response.length > 0) {
                    content.innerHTML = `
                        <h3>找到的聯賽：</h3>
                        ${data.response.map(l => `
                            <div class="card" onclick="fetchFixtures(${l.league.id})">
                                <strong>${l.league.name}</strong> (點擊查看 2026 賽程)
                            </div>
                        `).join('')}
                    `;
                } else {
                    content.innerHTML = "未找到資料。API 回傳: <pre>" + JSON.stringify(data, null, 2) + "</pre>";
                }
            } catch (e) {
                content.innerHTML = "❌ 連線失敗: " + e.message;
            }
        }

        async function fetchFixtures(leagueId) {
            const content = document.getElementById('content');
            content.innerHTML = "正在載入 2026 賽程...";
            try {
                const res = await fetch(`${BACKEND}/api/football?endpoint=fixtures?league=${leagueId}&season=2026`);
                const data = await res.json();
                
                if (data.response && data.response.length > 0) {
                    content.innerHTML = `<button onclick="init()">⬅️ 返回</button>` + data.response.map(m => `
                        <div class="card">
                            ${m.teams.home.name} vs ${m.teams.away.name}<br>
                            <small>${new Date(m.fixture.date).toLocaleDateString()}</small>
                        </div>
                    `).join('');
                } else {
                    content.innerHTML = "該聯賽目前無 2026 資料。<br><button onclick='init()'>返回</button>";
                }
            } catch (e) {
                content.innerHTML = "❌ 載入失敗: " + e.message;
            }
        }

        init();
    </script>
</body>
</html>
