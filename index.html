<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>2026 世界盃賽程</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .match-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 6px solid #2b4c7e; }
        .match-header { display: flex; justify-content: space-between; align-items: center; }
        .team { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .flag { width: 30px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1 style="text-align:center;">⚽ 2026 世界盃賽程</h1>
    <div class="match-grid" id="content"></div>

    <script type="module">
        import { matches } from './matches.js';
        const content = document.getElementById('content');
        content.innerHTML = matches.map(m => `
            <div class="card">
                <div class="match-header">
                    <div class="team"><img src="https://flagcdn.com/w40/${m.hCode}.png" class="flag"> ${m.hName}</div>
                    <div style="font-size:12px; color:#888;">VS</div>
                    <div class="team">${m.aName} <img src="https://flagcdn.com/w40/${m.aCode}.png" class="flag"></div>
                </div>
                <div style="text-align:center; margin-top:10px; font-size:12px; color:#555;">📅 2026-${m.date}</div>
            </div>
        `).join('');
    </script>
</body>
</html>
