<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 足球數據中心</title>
    <style>
        :root { --primary: #2b4c7e; --bg: #f4f7f6; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        h1 { color: var(--primary); text-align: center; }
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s; }
        .card:hover { transform: scale(1.02); }
        .loading { text-align: center; margin-top: 50px; font-weight: bold; color: var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h1>⚽ 2026 足球賽事</h1>
    <div id="app">
        <div id="content"></div>
    </div>

    <script>
        // 🚨 這裡填入你的 Vercel 網址 (結尾不要斜線)
        const BACKEND = "https://2026-fifa-439n.vercel.app"; 

        async function init() {
            renderFixtures();
        }

        async function renderFixtures() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading">📡 正在從後端擷取賽程...</div>';

            try {
                const res = await fetch(`${BACKEND}/api/football?endpoint=fixtures?league=1&season=2026`);
                const data = await res.json();
                
                content.innerHTML = data.response.map(m => `
                    <div class="card" onclick="loadSquad(${m.teams.home.id}, '${m.teams.home.name}')">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span>${m.teams.home.name} vs ${m.teams.away.name}</span>
                            <small>${new Date(m.fixture.date).toLocaleDateString()}</small>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                content.innerHTML = "❌ 連線失敗，請檢查 Vercel 網址或 API 設定。";
            }
        }

        async function loadSquad(teamId, teamName) {
            const content = document.getElementById('content');
            content.innerHTML = `<div class="loading">正在調閱 ${teamName} 球員名單...</div>`;

            try {
                const res = await fetch(`${BACKEND}/api/football?endpoint=players/squads?team=${teamId}`);
                const data = await res.json();
                const squad = data.response[0].players;

                content.innerHTML = `
                    <button onclick="renderFixtures()">⬅️ 回到賽程表</button>
                    <h2>${teamName} 球員陣容</h2>
                    ${squad.map(p => `
                        <div class="card" style="display:flex; align-items:center; gap:15px;">
                            <img src="${p.photo}" width="50" style="border-radius:25px; background:#ddd;">
                            <div>
                                <strong>${p.name}</strong><br>
                                <small>背號: ${p.number || '-'} | 位置: ${p.position}</small>
                            </div>
                        </div>
                    `).join('')}
                `;
            } catch (e) {
                content.innerHTML = "❌ 無法取得名單。<br><button onclick='renderFixtures()'>回列表</button>";
            }
        }

        init();
    </script>
</body>
</html>
