            { id: 104, stage: "世界盃 總決賽", date: "2026-07-20 03:00", h: "第101場勝者", hc: "un", a: "第102場勝者", ac: "un" }
        ];

        const savedScores = JSON.parse(localStorage.getItem('worldcup_scores')) || {};

        function renderSchedule() {
            const container = document.getElementById('schedule-container');
            container.innerHTML = fullMatches.map(m => {
                const homeFlagUrl = m.hc === 'un' ? 'https://flagcdn.com/w40/un.png' : `https://flagcdn.com/w40/${m.hc}.png`;
                const awayFlagUrl = m.ac === 'un' ? 'https://flagcdn.com/w40/un.png' : `https://flagcdn.com/w40/${m.ac}.png`;

                const matchScore = savedScores[m.id];
                const middleDisplay = matchScore 
                    ? `<div class="score-display">${matchScore.hScore} - ${matchScore.aScore}</div>`
                    : `<div class="vs">VS</div>`;

                return `
                    <div class="match-card" onclick="handleCardClick(event, ${m.id}, '${m.h}', '${m.a}')">
                        <div class="match-meta">
                            <span>場次 ${m.id}</span>
                            <span class="stage-tag">${m.stage}</span>
                        </div>
                        <div class="teams-area">
                            <div class="team" onclick="goToTeamPage(event, '${m.htKey}')">
                                <img src="${homeFlagUrl}" class="flag" alt="${m.h}">
                                <span class="team-name">${m.h}</span>
                            </div>
                            
                            ${middleDisplay}
                            
                            <div class="team" onclick="goToTeamPage(event, '${m.atKey}')">
                                <img src="${awayFlagUrl}" class="flag" alt="${m.a}">
                                <span class="team-name">${m.a}</span>
                            </div>
                        </div>
                        <div class="match-time">📅 ${m.date}</div>
                    </div>
                `;
            }).join('');
        }

        // 🌟 處理點擊區隔：如果點到國家就不跳出輸入框
        function handleCardClick(event, matchId, homeTeam, awayTeam) {
            // 檢查點擊的目標或其父層是否包含 'team' 類別，如果是，就代表點到國家，直接返回不理它
            if (event.target.closest('.team')) return;
            
            // 否則，照常執行輸入分數的功能
            enterScore(matchId, homeTeam, awayTeam);
        }

        // 🌟 自動跳轉至該國球隊大名單與世界排名頁面
        function goToTeamPage(event, teamKey) {
            event.stopPropagation(); // 阻止事件冒泡，防止觸發卡片的點擊事件
            if (!teamKey || teamKey === 'undefined') return;
            
            // 串接 Sky Sports 官方世界盃球隊百科（內含大名單、最新戰況、排名統計）
            const targetUrl = `https://www.skysports.com/football/teams/${teamKey}`;
            window.open(targetUrl, '_blank');
        }

        function enterScore(matchId, homeTeam, awayTeam) {
            const hScoreInput = prompt(`請輸入 [ ${homeTeam} ] 的得分:`, savedScores[matchId]?.hScore || "0");
            if (hScoreInput === null) return;

            const aScoreInput = prompt(`請輸入 [ ${awayTeam} ] 的得分:`, savedScores[matchId]?.aScore || "0");
            if (aScoreInput === null) return;

            if (isNaN(hScoreInput) || isNaN(aScoreInput) || hScoreInput.trim() === "" || aScoreInput.trim() === "") {
                alert("請輸入正確的數字比分！");
                return;
            }

            savedScores[matchId] = {
                hScore: parseInt(hScoreInput, 10),
                aScore: parseInt(aScoreInput, 10)
            };
            localStorage.setItem('worldcup_scores', JSON.stringify(savedScores));
            renderSchedule();
        }

        renderSchedule();
    </script>
