                const matchScore = savedScores[m.id];
                const middleDisplay = matchScore 
                    ? `<div class="score-display">${matchScore.hScore} - ${matchScore.aScore}</div>`
                    : `<div class="vs">VS</div>`;

                return `
                    <div class="match-card" onclick="handleCardClick(event, ${m.id}, '${m.h}', '${m.a}')">
                        <div class="match-meta">
                            <span>場次 ${m.id}</span>
                            <span class="stage-tag">${m.stage}</span>
                        </div>
                        <div class="teams-area">
                            <div class="team" onclick="goToChineseTeamPage(event, '${m.h}')">
                                <img src="${homeFlagUrl}" class="flag" alt="${m.h}">
                                <span class="team-name">${m.h}</span>
                            </div>
                            
                            ${middleDisplay}
                            
                            <div class="team" onclick="goToChineseTeamPage(event, '${m.a}')">
                                <img src="${awayFlagUrl}" class="flag" alt="${m.a}">
                                <span class="team-name">${m.a}</span>
                            </div>
                        </div>
                        <div class="match-time">📅 ${m.date}</div>
                    </div>
                `;
            }).join('');
        }

        function handleCardClick(event, matchId, homeTeam, awayTeam) {
            if (event.target.closest('.team')) return;
            enterScore(matchId, homeTeam, awayTeam);
        }

        // 🌟 核心升級：自動對接繁體中文維基百科行動版 (zh.m.wikipedia)
        function goToChineseTeamPage(event, teamName) {
            event.stopPropagation(); // 阻止事件冒泡
            
            // 如果是尚未確定的淘汰賽標籤，則不進行轉跳
            if (teamName.includes("組") || teamName.includes("場") || teamName.includes("分組")) return;

            // 為了確保精確對準足球隊條目，將國家名稱自動轉化為「國家官方足球隊」格式
            let wikiSearchName = `${teamName}國家足球隊`;
            
            // 特殊隊名校正（符合繁中維基百科的標準命名規則）
            if (teamName === "美國") wikiSearchName = "美國國家男子足球隊";
            if (teamName === "伊朗") wikiSearchName = "伊朗國家足球隊";
            if (teamName === "南韓") wikiSearchName = "南韓國家足球隊";

            // 生成專屬的手機繁中行動版維基連結
            const targetUrl = `https://zh.m.wikipedia.org/zh-tw/${encodeURIComponent(wikiSearchName)}`;
            window.open(targetUrl, '_blank');
        }

        function enterScore(matchId, homeTeam, awayTeam) {
            const hScoreInput = prompt(`請輸入 [ ${homeTeam} ] 的得分:`, savedScores[matchId]?.hScore || "0");
            if (hScoreInput === null) return;

            const aScoreInput = prompt(`請輸入 [ ${awayTeam} ] 的得分:`, savedScores[matchId]?.aScore || "0");
            if (aScoreInput === null) return;

            if (isNaN(hScoreInput) || isNaN(aScoreInput) || hScoreInput.trim() === "" || aScoreInput.trim() === "") {
                alert("請輸入正確的數字比分！");
                return;
            }

            savedScores[matchId] = {
                hScore: parseInt(hScoreInput, 10),
                aScore: parseInt(aScoreInput, 10)
            };
            localStorage.setItem('worldcup_scores', JSON.stringify(savedScores));
            renderSchedule();
        }

        renderSchedule();
    </script>
</body>
</html>
