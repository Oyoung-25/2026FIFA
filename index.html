<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>足球數據中心</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>世足賽程與球員</h1>
    <div id="app">
        <div id="fixtures"></div>
    </div>

    <script>
        const BACKEND = "https://2026-fifa.vercel.app"; // 填入你的 Vercel 網址 (例: https://my-app.vercel.app)

        async function loadFixtures() {
            const res = await fetch(`${BACKEND}/api/football?endpoint=fixtures?league=1&season=2026`);
            const data = await res.json();
            document.getElementById('fixtures').innerHTML = data.response.map(m => `
                <div class="card" onclick="loadSquad(${m.teams.home.id})">
                    ${m.teams.home.name} vs ${m.teams.away.name}
                </div>
            `).join('');
        }

        async function loadSquad(teamId) {
            const res = await fetch(`${BACKEND}/api/football?endpoint=players/squads?team=${teamId}`);
            const data = await res.json();
            alert(data.response[0].players.map(p => p.name).join(', '));
        }

        loadFixtures();
    </script>
</body>
</html>
