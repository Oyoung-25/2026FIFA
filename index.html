<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 世界盃終極看板</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; margin: 0; }
        .control-bar { max-width: 1400px; margin: 0 auto 20px auto; }
        .view-selector { padding: 8px 16px; font-size: 16px; font-weight: bold; color: #38bdf8; background: #1e293b; border: 2px solid #38bdf8; border-radius: 8px; cursor: pointer; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .match-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 15px; max-width: 1400px; margin: 0 auto; }
        .match-card { background: #1e293b; padding: 16px; border-radius: 12px; border: 1px solid #334155; }
        .match-time { color: #38bdf8; font-weight: bold; }
        h1 { text-align: center; color: #38bdf8; }
    </style>
</head>
<body>

    <div class="control-bar">
        <select class="view-selector" onchange="switchView(this.value)">
            <option value="schedule">📅 觀看 賽程時刻表</option>
            <option value="standings">📊 觀看 小組積分榜</option>
        </select>
    </div>

    <div id="schedule-view" class="view-section active">
        <h1>🏆 2026 世界盃即時賽程</h1>
        <div class="match-grid" id="schedule-container"></div>
    </div>

    <script>
        // 核心資料庫 (保留完整賽程)
        const fullMatches = [
            { id: 1, group: "A", date: "2026-06-12 03:00", h: "墨西哥", a: "南非" },
            { id: 21, group: "L", date: "2026-06-18 00:00", h: "加納", a: "巴拿馬" },
            { id: 22, group: "L", date: "2026-06-18 03:00", h: "英格蘭", a: "南韓" }
            // ... 其餘賽程
        ];

        // 取得今日日期字串
        function getTodayString() {
            return new Date().toISOString().split('T')[0];
        }

        // 渲染賽程 (修正邏輯)
        function renderSchedule() {
            const container = document.getElementById('schedule-container');
            const todayStr = getTodayString();
            container.innerHTML = '';

            fullMatches.forEach(m => {
                // 自動篩選邏輯：如果是今天，直接顯示；否則顯示全部
                if (m.date.startsWith(todayStr)) {
                    const card = document.createElement('div');
                    card.className = 'match-card';
                    card.innerHTML = `
                        <div class="match-time">${m.date}</div>
                        <div>${m.h} vs ${m.a}</div>
                        <input type="text" placeholder="輸入比分" 
                               value="${localStorage.getItem('score_' + m.id) || ''}"
                               onchange="saveScore(${m.id}, this.value)">
                    `;
                    container.appendChild(card);
                }
            });
        }

        // 儲存比分 (確保資料不流失)
        function saveScore(id, val) {
            localStorage.setItem('score_' + id, val);
        }

        // 切換頁面
        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(view + '-view').classList.add('active');
        }

        // 初始化
        renderSchedule();
    </script>
</body>
</html>
