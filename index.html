<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 足球數據中心</title>
    <style>
        :root { --primary: #2b4c7e; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        h1 { color: var(--primary); text-align: center; }
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; }
        .loading { text-align: center; margin-top: 50px; font-weight: bold; color: var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h1>⚽ 2026 足球賽事</h1>
    <div id="app">
        <div id="content"></div>
    </div>

    <script>
        // 1. 請確認這裡填入你的網址 (結尾無斜線)
        const BACKEND = "https://2026-fifa-439n.vercel.app"; 

        async function init() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading">📡 正在載入 2026 賽程...</div>';
            
            try {
                // 2. 這就是補上 season=2026 的正確寫法
                // 修改這一行：
                const res = await fetch(`${BACKEND}/api/football?endpoint=fixtures?league=39&season=2026`);
                const data = await res.json();
                
                if (!data.response || data.response.length === 0) {
                    content.innerHTML = "目前暫無 2026 年賽事資料。<br><small>API 回傳: " + JSON.stringify(data) + "</small>";
                    return;
                }

                content.innerHTML = data.response.map(m => `
                    <div class="card" onclick="loadSquad(${m.teams.home.id}, '${m.teams.home.name}')">
                        <strong>${m.teams.home.name} vs ${m.teams.away.name}</strong><br>
                        <small>日期: ${new Date(m.fixture.date).toLocaleDateString()}</small>
                    </div>
                `).join('');
            } catch (e) {
                content.innerHTML = "❌ 連線失敗: " + e.message;
            }
        }

        async function loadSquad(teamId, teamName) {
            const content = document.getElementById('content');
            content.innerHTML = `<div class="loading">正在調閱 ${teamName} 球員名單...</div>`;

            try {
                const res = await fetch(`${BACKEND}/api/football?endpoint=players/squads?team=${teamId}`);
                const data = await res.json();
                const squad = data.response[0].players;

                content.innerHTML = `
                    <button onclick="init()">⬅️ 回到賽程表</button>
                    <h2>${teamName} 陣容</h2>
                    ${squad.map(p => `
                        <div class="card" style="display:flex; align-items:center; gap:15px;">
                            <img src="${p.photo}" width="50" style="border-radius:25px; background:#ddd;">
                            <div>
                                <strong>${p.name}</strong><br>
                                <small>背號: ${p.number || '-'} | 位置: ${p.position}</small>
                            </div>
                        </div>
                    `).join('')}
                `;
            } catch (e) {
                content.innerHTML = "❌ 無法取得名單。<br><button onclick='init()'>回賽程表</button>";
            }
        }

        init();
    </script>
</body>
</html>
